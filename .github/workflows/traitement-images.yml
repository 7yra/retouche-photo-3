name: Traitement images

on:
  workflow_dispatch:
  push:
    paths:
      - "photos_a_traiter/**"
      - "photos_reference/**"
      - "process_images.py"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  process-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier les fichiers attendus
        run: |
          test -f process_images.py
          test -f photos_reference/fond_2.png
          ls -la photos_a_traiter

      - name: Exécuter le traitement
        run: |
          python process_images.py

      - name: Commit des images générées
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output || true
          git diff --cached --quiet || git commit -m "Ajout des images traitées"
          git push
